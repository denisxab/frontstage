<style>
  .prose-readme h1, .prose-readme h2, .prose-readme h3, .prose-readme h4 {
    color: #e2e8f0; font-weight: 600; margin-top: 1em; margin-bottom: 0.4em; line-height: 1.4;
  }
  .prose-readme h1 { font-size: 1rem; }
  .prose-readme h2 { font-size: 0.875rem; border-bottom: 1px solid #2e3347; padding-bottom: 0.3em; }
  .prose-readme h3 { font-size: 0.8rem; }
  .prose-readme p  { margin: 0.5em 0; }
  .prose-readme ul, .prose-readme ol { padding-left: 1.25em; margin: 0.4em 0; }
  .prose-readme li { margin: 0.2em 0; list-style: disc; }
  .prose-readme ol li { list-style: decimal; }
  .prose-readme a  { color: #6366f1; text-decoration: none; }
  .prose-readme a:hover { text-decoration: underline; }
  .prose-readme code {
    background: #252836; color: #e2e8f0; padding: 0.1em 0.35em;
    border-radius: 3px; font-family: "JetBrains Mono", monospace; font-size: 0.85em;
  }
  .prose-readme pre {
    background: #252836; color: #c8d3e0; padding: 0.75em 1em;
    border-radius: 6px; overflow-x: auto; margin: 0.6em 0; line-height: 1.5;
  }
  .prose-readme pre code { background: none; padding: 0; font-size: 1em; }
  .prose-readme blockquote {
    border-left: 3px solid #3d4460; margin: 0.5em 0; padding: 0.2em 0.75em;
    color: #8892a4; font-style: italic;
  }
  .prose-readme table { width: 100%; border-collapse: collapse; margin: 0.6em 0; }
  .prose-readme th, .prose-readme td {
    border: 1px solid #2e3347; padding: 0.3em 0.6em; text-align: left;
  }
  .prose-readme th { background: #252836; color: #e2e8f0; font-weight: 600; }
  .prose-readme img { max-width: 100%; height: auto; border-radius: 4px; }
  .prose-readme hr { border: none; border-top: 1px solid #2e3347; margin: 0.75em 0; }
</style>
<div class="rounded-lg border" style="background:#1a1d27; border-color:#2e3347; overflow:hidden;">
  <!-- Заголовок панели -->
  <div class="flex items-center gap-2 px-4 py-2.5 border-b" style="border-color:#2e3347; background:#191c26;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <line x1="12" y1="3" x2="12" y2="9"/>
      <line x1="12" y1="15" x2="12" y2="21"/>
      <line x1="3" y1="12" x2="9" y2="12"/>
      <line x1="15" y1="12" x2="21" y2="12"/>
    </svg>
    <span class="text-xs font-semibold uppercase" style="color:#8892a4; letter-spacing:0.06em;">Последний коммит</span>
  </div>
  <!-- Ветка -->
  <div class="px-4 pt-3 pb-2 flex items-center gap-2">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <line x1="6" y1="3" x2="6" y2="15"/>
      <circle cx="18" cy="6" r="3"/>
      <circle cx="6" cy="18" r="3"/>
      <path d="M18 9a9 9 0 0 1-9 9"/>
    </svg>
    <span class="font-mono text-xs px-1.5 py-0.5 rounded border"
          style="background:#1e2045; border-color:#3d4460; color:#818cf8;">{{ branch }}</span>
  </div>
  <!-- Сообщение коммита -->
  <div class="px-4 pb-3 flex items-start gap-2.5">
    <span class="font-mono text-xs shrink-0 px-1.5 py-0.5 rounded mt-0.5"
          style="background:#252836; color:#6366f1; letter-spacing:0.03em;">{{ hash }}</span>
    <span class="text-xs leading-relaxed" style="color:#e2e8f0;">{{ message }}</span>
  </div>
  <!-- Автор и дата -->
  <div class="px-4 py-2.5 border-t flex items-center justify-between gap-2"
       style="border-color:#2e3347; background:#191c26;">
    <div class="flex items-center gap-1.5">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#5a6478" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="text-xs" style="color:#5a6478;">{{ author }}</span>
    </div>
    <span class="text-xs font-mono" style="color:#4a5568;">{{ date }}</span>
  </div>
  {% if readme_html %}
  <!-- README.md -->
  <div class="border-t" style="border-color:#2e3347;">
    <div class="flex items-center gap-2 px-4 py-2" style="background:#191c26;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <span class="text-xs font-semibold uppercase" style="color:#8892a4; letter-spacing:0.06em;">README</span>
    </div>
    <div class="px-4 py-3 prose-readme" style="color:#c8d3e0; font-size:0.75rem; line-height:1.6; max-height:400px; overflow-y:auto; overflow-x:hidden; min-width:0; word-break:break-word;">
      {{ readme_html | safe }}
    </div>
  </div>
  {% endif %}
</div>
