apiVersion: frontstage/v1
kind: Service
metadata:
  name: notification-service
  title: "Notification Service"
  description: "ESP-рассылки и триггерные уведомления: напоминания о визитах, акции, SMS-подтверждения"
  tags: [python, celery, email, sms, esp]
  links:
    - title: "Grafana"
      url: https://grafana.beautytech.ru/d/notifications
spec:
  lifecycle: production
  owner: team:backend
  type: worker
  dependsOn:
    - database:session-redis
    - database:events-kafka
  deployments:
    - host: rus
      status: healthy
