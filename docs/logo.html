<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 537px;
    height: 240px;
    background: #1a1f2e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  a {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.025em;
    text-decoration: none;
    color: #e2e8f0;
  }
  span { color: #6366f1; }
  .sub {
    font-size: 0.75rem;
    margin-top: 2px;
    color: #5a6478;
  }
</style>
</head>
<body>
  <div class="logo-wrap">
    <a href="/">Front<span>Stage</span></a>
    <div class="sub">developer portal</div>
  </div>
</body>
</html>
