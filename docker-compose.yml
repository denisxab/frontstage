services:
    redis:
        image: redis:7-alpine
        command: redis-server --appendonly yes
        volumes:
            - ./data/redis_data:/data
        restart: unless-stopped
        networks:
            - frontstage
        deploy:
            resources:
                limits:
                    cpus: "0.2"
                    memory: 128M
                reservations:
                    memory: 32M

    frontstage:
        build: .
        volumes:
            - ./catalog:/app/catalog:ro
            - ./src:/app/src:ro
            - ./logs:/app/logs
        expose:
            - 8080
        env_file:
            - .env
        environment:
            CATALOG_DIR: /app/catalog
            REDIS_URL: redis://redis:6379
        depends_on:
            - redis
        restart: unless-stopped
        networks:
            - my-proxy-network
            - frontstage
        deploy:
            resources:
                limits:
                    cpus: "0.5"
                    memory: 512M
                reservations:
                    memory: 128M

    nginx:
        image: nginx:1.27-alpine
        ports:
            - "127.0.0.1:8795:80"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            - frontstage
        restart: unless-stopped
        networks:
            - my-proxy-network
        deploy:
            resources:
                limits:
                    cpus: "0.1"
                    memory: 64M
                reservations:
                    memory: 16M

networks:
    my-proxy-network:
        external: true
    frontstage:
